<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>旅行攻略模板 · 竖屏录制版</title>
    <link rel="stylesheet" href="../../templates/vertical-caption-gallery/styles.css" />
  </head>
  <body>
    <div class="stage">
      <main class="story-canvas" id="canvas" aria-live="polite">
        <div id="slides"></div>
        <button class="click-zone left" id="prev" type="button" aria-label="上一页">上一页</button>
        <button class="click-zone right" id="next" type="button" aria-label="下一页">下一页</button>
        <div class="rec-ui" id="dots" aria-hidden="true"></div>
      </main>
    </div>

    <script src="./guide.config.js"></script>
    <script src="../../templates/vertical-caption-gallery/app.js"></script>
  </body>
</html>
